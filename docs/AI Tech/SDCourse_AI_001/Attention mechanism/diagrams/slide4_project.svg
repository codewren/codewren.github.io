<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" font-family="'Segoe UI',Calibri,system-ui,sans-serif" width="100%">
<rect width="980" height="300" fill="#0B1524" rx="14"/>
<text x="165.0" y="72" fill="#3B82F6" font-size="17" font-weight="bold" text-anchor="middle" font-family="'Segoe UI',Calibri,system-ui,sans-serif">X</text>
<rect x="90" y="90" width="150" height="150" rx="9" fill="#13233B" stroke="#3B82F6" stroke-width="1.6"/>
<text x="165.0" y="170.0" fill="#8FA6C4" font-size="15" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace">n×512</text>
<text x="165.0" y="270" fill="#8FA6C4" font-size="15" font-weight="bold" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace">(3, 512)</text>
<text x="280" y="173.0" fill="#EAF2FB" font-size="30" font-weight="bold" text-anchor="middle">×</text>
<text x="395.0" y="72" fill="#22D3C5" font-size="17" font-weight="bold" text-anchor="middle" font-family="'Segoe UI',Calibri,system-ui,sans-serif">W_Q</text>
<rect x="320" y="90" width="150" height="150" rx="9" fill="#13233B" stroke="#22D3C5" stroke-width="1.6"/>
<text x="395.0" y="170.0" fill="#8FA6C4" font-size="15" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace">512×64</text>
<text x="395.0" y="270" fill="#8FA6C4" font-size="15" font-weight="bold" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace">(512, 64)</text>
<text x="510" y="173.0" fill="#EAF2FB" font-size="30" font-weight="bold" text-anchor="middle">=</text>
<text x="625.0" y="72" fill="#F5A623" font-size="17" font-weight="bold" text-anchor="middle" font-family="'Segoe UI',Calibri,system-ui,sans-serif">Q</text>
<rect x="550" y="90" width="150" height="150" rx="9" fill="#13233B" stroke="#F5A623" stroke-width="1.6"/>
<text x="625.0" y="170.0" fill="#8FA6C4" font-size="15" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace">n×64</text>
<text x="625.0" y="270" fill="#8FA6C4" font-size="15" font-weight="bold" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace">(3, 64)</text>
<rect x="740" y="75" width="220" height="180" rx="9" fill="#13233B" stroke="#8FA6C4" stroke-width="1"/>
<text x="756" y="108" fill="#EAF2FB" font-size="15" font-weight="bold" text-anchor="start" font-family="'Segoe UI',Calibri,system-ui,sans-serif">Same recipe for K and V</text>
<text x="756" y="140" fill="#34D399" font-size="14" font-weight="normal" text-anchor="start" font-family="ui-monospace,'Courier New',monospace">K = X × W_K → (3, 64)</text>
<text x="756" y="162" fill="#F97066" font-size="14" font-weight="normal" text-anchor="start" font-family="ui-monospace,'Courier New',monospace">V = X × W_V → (3, 64)</text>
<text x="756" y="194" fill="#8FA6C4" font-size="13" font-weight="normal" text-anchor="start" font-family="ui-monospace,'Courier New',monospace">Q, K, V all share shape</text>
<text x="756" y="214" fill="#8FA6C4" font-size="13" font-weight="normal" text-anchor="start" font-family="ui-monospace,'Courier New',monospace">(n, d_k) = (3, 64).</text>
</svg>
