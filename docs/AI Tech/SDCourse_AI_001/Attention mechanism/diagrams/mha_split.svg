<rect x="470" y="150" width="470" height="120" rx="10" fill="#13233B" stroke="#22D3C5" stroke-width="1.3"/>
<text x="492" y="188" fill="#22D3C5" font-size="18" font-weight="bold" text-anchor="start" font-family="ui-monospace,'Courier New',monospace">d_k = d_model / num_heads</text>
